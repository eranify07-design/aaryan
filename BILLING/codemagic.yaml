workflows:
  android-release:
    name: Dastak Android APK Build
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        PACKAGE_MANAGER: pnpm

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm

      - name: Install Node dependencies
        script: |
          cd dastak-mobile
          pnpm install --no-frozen-lockfile

      - name: Set up Google Services (Firebase)
        script: |
          # If you use Firebase, add google-services.json as a Codemagic environment file
          # named GOOGLE_SERVICES and enable it in the Environment > Files section,
          # then uncomment the two lines below:
          # echo $GOOGLE_SERVICES | base64 --decode > dastak-mobile/android/app/google-services.json
          echo "Skipping google-services.json setup (add your own if needed)"

      - name: Build Android Debug APK
        script: |
          cd dastak-mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - dastak-mobile/android/app/build/outputs/apk/debug/app-debug.apk
      - dastak-mobile/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
